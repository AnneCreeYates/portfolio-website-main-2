version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"   # faster for security fixes only
    # Only security updates here
    allow:
    - dependency-type: "production"
    open-pull-requests-limit: 5
    security-updates: true
    target-branch: "dependabot/security-updates"

  # NPM dependencies - critical security and patch updates weekly
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "/"

    allow:
      - dependency-type: "production"
      - dependency-type: "development"

    groups:
      security:
        dependency-type: "production"
        update-types: ["patch", "minor"]
        patterns: ["*security*", "*vuln*"]
      patch:
        dependency-type: "production"
        update-types: ["patch"]
      minor:
        dependency-type: "production"
        update-types: ["minor"]
      dev-dependencies:
        dependency-type: "development"

    commit-message:
      prefix: "chore(deps):"
      include: "scope"

    reviewers:
      - "AnneCreeYates"

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    update-types: ["patch", "minor"]
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
